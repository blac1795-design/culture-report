<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조직문화 트렌드 뉴스레터</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
      padding: 2rem 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: #1D9E75;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .main {
      padding: 2.5rem 0 4rem;
    }

    .year-section {
      margin-bottom: 2.5rem;
    }

    .year-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e8e8e4;
    }

    .month-section {
      margin-bottom: 1.5rem;
    }

    .month-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 12px;
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: #1D9E75;
      box-shadow: 0 2px 12px rgba(29, 158, 117, 0.08);
    }

    .card-week {
      font-size: 11px;
      font-weight: 600;
      color: #1D9E75;
      background: #E1F5EE;
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .card-meta {
      font-size: 12px;
      color: #aaa;
    }

    .card-arrow {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      color: #ccc;
      font-size: 14px;
    }

    .card:hover .card-arrow {
      color: #1D9E75;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: #aaa;
      font-size: 14px;
    }

    /* 새 파일 추가 안내 카드 */
    .add-hint {
      background: #f9f9f7;
      border: 1px dashed #d0d0ca;
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      color: #bbb;
      font-size: 13px;
      margin-top: 4px;
    }

    .add-hint span {
      display: block;
      font-size: 20px;
      margin-bottom: 6px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #ccc;
      padding: 2rem 0;
      border-top: 1px solid #e8e8e4;
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="header-icon">📋</div>
      <div class="header-text">
        <h1>조직문화 트렌드 뉴스레터</h1>
        <p>헥토이노베이션 조직문화팀 · 월 1~2회 발행</p>
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="container">

    <!-- ✅ 2026년 섹션 -->
    <div class="year-section">
      <div class="year-label">2026</div>

      <!-- 4월 -->
      <div class="month-section">
        <div class="month-label">4월</div>
        <div class="card-grid">

          <!-- 4주차 -->
          <a class="card" href="2026-04-w4.html">
            <div class="card-week">4주차</div>
            <div class="card-title">2026년 4월 4주차<br>조직문화 트렌드</div>
            <div class="card-meta">2026.04</div>
            <div class="card-arrow">→</div>
          </a>

          <!-- 5주차 -->
          <a class="card" href="2026-04-w5.html">
            <div class="card-week">5주차</div>
            <div class="card-title">2026년 4월 5주차<br>조직문화 트렌드</div>
            <div class="card-meta">2026.04</div>
            <div class="card-arrow">→</div>
          </a>

        </div>
      </div>

      <!-- 5월 (파일 추가 시 아래 주석 해제 후 사용) -->
      <!--
      <div class="month-section">
        <div class="month-label">5월</div>
        <div class="card-grid">
          <a class="card" href="2026-05-w1.html">
            <div class="card-week">1주차</div>
            <div class="card-title">2026년 5월 1주차<br>조직문화 트렌드</div>
            <div class="card-meta">2026.05</div>
            <div class="card-arrow">→</div>
          </a>
        </div>
      </div>
      -->

    </div>
    <!-- // 2026년 섹션 끝 -->

  </div>
</main>

<footer>
  조직문화팀 | 헥토이노베이션
</footer>

</body>
</html>
