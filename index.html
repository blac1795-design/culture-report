<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조직문화 트렌드 뉴스레터</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
      padding: 2rem 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-icon {
      width: 44px;
      height: 44px;
      background: #1D9E75;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .main {
      padding: 2.5rem 0 4rem;
    }

    .year-section {
      margin-bottom: 2.5rem;
    }

    .year-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e8e8e4;
    }

    .month-section {
      margin-bottom: 1.5rem;
    }

    .month-label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.75rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 12px;
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: #1D9E75;
      box-shadow: 0 2px 12px rgba(29, 158, 117, 0.08);
    }

    .card-week {
      font-size: 11px;
      font-weight: 600;
      color: #1D9E75;
      background: #E1F5EE;
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .card-meta {
      font-size: 12px;
      color: #aaa;
    }

    .card-arrow {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      color: #ccc;
      font-size: 14px;
    }

    .card:hover .card-arrow {
      color: #1D9E75;
    }

    .loading {
      text-align: center;
      padding: 4rem 0;
      color: #aaa;
      font-size: 14px;
    }

    .loading-dot {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    .error-msg {
      text-align: center;
      padding: 3rem 0;
      color: #ccc;
      font-size: 13px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #ccc;
      padding: 2rem 0;
      border-top: 1px solid #e8e8e4;
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="header-icon">📋</div>
      <div class="header-text">
        <h1>조직문화 트렌드 뉴스레터</h1>
        <p>헥토이노베이션 조직문화팀 · 월 1~2회 발행</p>
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="container">
    <div id="content">
      <div class="loading">
        <span class="loading-dot">●</span>
        <span class="loading-dot">●</span>
        <span class="loading-dot">●</span>
        <p style="margin-top:12px;">뉴스레터 목록 불러오는 중...</p>
      </div>
    </div>
  </div>
</main>

<footer>
  조직문화팀 | 헥토이노베이션
</footer>

<script>
  // ────────────────────────────────────────
  // 설정값 (변경 불필요)
  const GITHUB_USER = 'blac1795-design';
  const GITHUB_REPO = 'culture-report';
  const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;
  // ────────────────────────────────────────

  const MONTH_KR = ['', '1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // 파일명 파싱: 2026-04-w4.html → { year, month, week }
  function parseFilename(name) {
    const m = name.match(/^(\d{4})-(\d{2})-w(\d+)\.html$/);
    if (!m) return null;
    return { year: m[1], month: parseInt(m[2]), week: parseInt(m[3]), name };
  }

  function renderCards(files) {
    if (!files.length) {
      return '<div class="error-msg">아직 업로드된 뉴스레터가 없어요.</div>';
    }

    // 연도별 그룹화
    const byYear = {};
    files.forEach(f => {
      if (!byYear[f.year]) byYear[f.year] = {};
      if (!byYear[f.year][f.month]) byYear[f.year][f.month] = [];
      byYear[f.year][f.month].push(f);
    });

    let html = '';
    // 최신 연도 먼저
    Object.keys(byYear).sort((a, b) => b - a).forEach(year => {
      html += `<div class="year-section"><div class="year-label">${year}</div>`;

      // 최신 월 먼저
      Object.keys(byYear[year]).sort((a, b) => b - a).forEach(month => {
        html += `<div class="month-section">
          <div class="month-label">${MONTH_KR[month]}</div>
          <div class="card-grid">`;

        // 최신 주차 먼저
        byYear[year][month].sort((a, b) => b.week - a.week).forEach(f => {
          html += `
            <a class="card" href="${f.name}">
              <div class="card-week">${f.week}주차</div>
              <div class="card-title">${year}년 ${MONTH_KR[month]} ${f.week}주차<br>조직문화 트렌드</div>
              <div class="card-meta">${year}.${String(month).padStart(2,'0')}</div>
              <div class="card-arrow">→</div>
            </a>`;
        });

        html += `</div></div>`;
      });

      html += `</div>`;
    });

    return html;
  }

  async function loadFiles() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error('API 오류');
      const data = await res.json();

      const files = data
        .map(f => parseFilename(f.name))
        .filter(Boolean);

      document.getElementById('content').innerHTML = renderCards(files);
    } catch (e) {
      document.getElementById('content').innerHTML =
        '<div class="error-msg">목록을 불러오지 못했어요.<br>잠시 후 새로고침 해주세요.</div>';
    }
  }

  loadFiles();
</script>

</body>
</html>
